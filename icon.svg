<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="faceGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3f4a" />
      <stop offset="100%" style="stop-color:#252830" />
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded background card — corners are transparent outside this shape -->
  <rect x="4" y="4" width="92" height="92" rx="20" ry="20" fill="#1e2128" />
  <!-- Subtle inner rim -->
  <rect x="4" y="4" width="92" height="92" rx="20" ry="20" fill="none" stroke="#3a3f4a" stroke-width="0.8" />

  <!-- Face circle -->
  <circle cx="50" cy="48" r="26" fill="url(#faceGrad)" />
  <circle cx="50" cy="48" r="26" fill="none" stroke="#50576a" stroke-width="0.8" />

  <!-- Eyes -->
  <ellipse cx="40" cy="44" rx="5" ry="4.2" fill="#141618" />
  <ellipse cx="60" cy="44" rx="5" ry="4.2" fill="#141618" />
  <!-- Iris — light gray, no color -->
  <ellipse cx="40" cy="44" rx="3" ry="2.8" fill="#8a95a8" filter="url(#softGlow)" />
  <ellipse cx="60" cy="44" rx="3" ry="2.8" fill="#8a95a8" filter="url(#softGlow)" />
  <!-- Specular highlight -->
  <circle cx="41.3" cy="42.6" r="0.85" fill="#dce3ee" fill-opacity="0.95" />
  <circle cx="61.3" cy="42.6" r="0.85" fill="#dce3ee" fill-opacity="0.95" />

  <!-- Mouth — composed, neutral -->
  <path d="M 43 55 Q 50 60 57 55" fill="none" stroke="#50576a" stroke-width="1.5" stroke-linecap="round" />

  <!-- Antenna -->
  <line x1="50" y1="22" x2="50" y2="15" stroke="#50576a" stroke-width="1.4" stroke-linecap="round" />
  <circle cx="50" cy="13" r="2" fill="#8a95a8" filter="url(#softGlow)" />

  <!-- Side ear panels -->
  <rect x="20" y="40" width="5" height="14" rx="2.5" fill="#2a2e38" stroke="#50576a" stroke-width="0.6" />
  <rect x="75" y="40" width="5" height="14" rx="2.5" fill="#2a2e38" stroke="#50576a" stroke-width="0.6" />

  <!-- Neck -->
  <rect x="43" y="73" width="14" height="7" rx="3" fill="#2a2e38" stroke="#50576a" stroke-width="0.6" />

  <!-- Collar base -->
  <rect x="31" y="79" width="38" height="5" rx="2.5" fill="#1e2128" stroke="#3a3f4a" stroke-width="0.6" />
</svg>
